name: Vercel Deploy

# Native Vercel Git integration handles deploys and GitHub deployment status.
# This workflow is kept for manual redeploys only (Actions → Vercel Deploy → Run workflow).
on:
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_BLGuaFgpNTsD6QEkZMousZLE
  VERCEL_PROJECT_ID: prj_twtZzBDHLdrWwIA6QF3pBStBsJA8

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@48.8.0

      - name: Pull Vercel environment
        run: |
          vercel pull --yes \
            --environment=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production' || 'preview' }} \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: |
          vercel build \
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_DESIGN_VARIANT: modern

      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt \
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const marker = '<!-- vercel-preview -->';
            const body = `${marker}\n✅ **Vercel preview:** ${process.env.DEPLOY_URL}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
